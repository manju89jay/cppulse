name: 'cppulse Health Report'
description: 'Run cppulse C++ codebase health analysis and post results as a PR comment'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  repo-path:
    description: 'Path to the C++ repository to analyze'
    default: '.'
  base-ref:
    description: 'Base branch/ref for diff comparison (e.g. origin/main)'
    default: ''
  post-comment:
    description: 'Post results as a PR comment (true/false)'
    default: 'true'
  generate-pdf:
    description: 'Generate PDF report as artifact (true/false)'
    default: 'false'
  fail-on-regression:
    description: 'Fail the action if health score decreases vs base (true/false)'
    default: 'false'
  github-token:
    description: 'GitHub token for posting PR comments'
    default: ${{ github.token }}

outputs:
  health-score:
    description: 'Overall health score (0-100)'
  findings-count:
    description: 'Total number of findings'
  new-findings:
    description: 'Number of new findings introduced in this PR'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    INPUT_REPO_PATH: ${{ inputs.repo-path }}
    INPUT_BASE_REF: ${{ inputs.base-ref }}
    INPUT_POST_COMMENT: ${{ inputs.post-comment }}
    INPUT_GENERATE_PDF: ${{ inputs.generate-pdf }}
    INPUT_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
