version: "3.9"

# ── Shared volume for pipeline outputs ───────────────────────────────────────
volumes:
  cppulse_output:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── 1. analyzer-core (C++17 static analysis) ────────────────────────────
  analyzer-core:
    build:
      context: ./analyzer-core
      dockerfile: Dockerfile
    volumes:
      - ${REPO_PATH:-.}:/repo:ro
      - cppulse_output:/output
    environment:
      - OUTPUT_DIR=/output
    command: ["/usr/local/bin/cppulse-analyzer", "--repo", "/repo", "--output", "/output"]

  # ── 2. git-miner (Python git history analysis) ──────────────────────────
  git-miner:
    build:
      context: ./git-miner
      dockerfile: Dockerfile
    volumes:
      - ${REPO_PATH:-.}:/repo:ro
      - cppulse_output:/output
    environment:
      - OUTPUT_DIR=/output
    depends_on:
      analyzer-core:
        condition: service_completed_successfully
    command: ["python3", "-m", "src.main", "--repo", "/repo", "--output", "/output"]

  # ── 3. predictor (XGBoost ML pipeline) ──────────────────────────────────
  predictor:
    build:
      context: ./predictor
      dockerfile: Dockerfile
    volumes:
      - cppulse_output:/output
    environment:
      - OUTPUT_DIR=/output
    depends_on:
      analyzer-core:
        condition: service_completed_successfully
      git-miner:
        condition: service_completed_successfully
    command: ["python3", "-m", "src.main", "--input", "/output", "--output", "/output"]

  # ── 4. report-engine (FastAPI + PDF) ────────────────────────────────────
  report-engine:
    build:
      context: ./report-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - cppulse_output:/output
    environment:
      - DATA_DIR=/output
    depends_on:
      predictor:
        condition: service_completed_successfully
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]

  # ── 5. dashboard (React/TypeScript) ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - report-engine
