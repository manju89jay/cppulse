# cppulse Health Report for POCO C++ Libraries
#
# This workflow runs cppulse static analysis on every PR that modifies
# C++ files and posts a health report as a PR comment.
#
# Add this file to .github/workflows/cppulse.yml in your repository.
# See: https://github.com/manju89jay/cppulse

name: cppulse Health Report

on:
  pull_request:
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'

permissions:
  contents: read
  pull-requests: write

jobs:
  cppulse:
    name: C++ Health Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-miner analysis

      - name: Run cppulse analysis
        uses: manju89jay/cppulse/.github/actions/cppulse@main
        with:
          repo-path: '.'
          base-ref: 'origin/${{ github.base_ref }}'
          post-comment: 'true'
          generate-pdf: 'true'
          fail-on-regression: 'false'

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppulse-health-report
          path: cppulse-output/report.pdf
          retention-days: 30
